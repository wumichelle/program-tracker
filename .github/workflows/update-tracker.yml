name: Update program tracker

on:
  schedule:
    - cron: "30 11 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update page status data
        run: python scripts/update_status.py

      - name: Create alert issue if program pages changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          history_path = Path("data/status-history.json")
          alert_path = Path("alert.md")

          if not history_path.exists():
              Path("should_alert.txt").write_text("no")
              raise SystemExit

          history = json.loads(history_path.read_text())

          items = []
          for item in history.values():
              if item.get("changed") is True:
                  items.append(item)

          if not items:
              Path("should_alert.txt").write_text("no")
              raise SystemExit

          lines = []
          lines.append("# Program tracker alert")
          lines.append("")
          lines.append("The tracker detected changes on the following official program pages.")
          lines.append("Please open the official links and check whether applications, deadlines, or eligibility have changed.")
          lines.append("")

          for item in items:
              lines.append(f"## {item.get('company', '')} - {item.get('program', '')}")
              lines.append("")
              lines.append(f"Status: {item.get('status_text', 'Check page')}")
              lines.append("")
              lines.append(f"Link: {item.get('url', '')}")
              lines.append("")
              signal = item.get("deadline_text") or item.get("latest_match") or "Page changed."
              lines.append(f"Signal: {signal}")
              lines.append("")
              lines.append("---")
              lines.append("")

          alert_path.write_text("\n".join(lines))
          Path("should_alert.txt").write_text("yes")
          PY

          if [ "$(cat should_alert.txt)" = "yes" ]; then
            gh issue create \
              --title "Program tracker alert: pages changed and need checking" \
              --body-file alert.md
          else
            echo "No alert needed."
          fi

      - name: Commit updated tracker data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update program tracker status data"
          file_pattern: data/*.json
