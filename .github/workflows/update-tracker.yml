name: Update program tracker

on:
  schedule:
    - cron: "30 11 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update page status data
        run: python scripts/update_status.py

      - name: Create issue if tracker finds changes
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const historyPath = "data/status-history.json";
            if (!fs.existsSync(historyPath)) {
              console.log("No status history found.");
              return;
            }

            const history = JSON.parse(fs.readFileSync(historyPath, "utf8"));

            const changed = Object.values(history).filter(item =>
              item.changed === true ||
              (item.status_text || "").toLowerCase().includes("application") ||
              (item.status_text || "").toLowerCase().includes("deadline")
            );

            if (changed.length === 0) {
              console.log("No important changes found.");
              return;
            }

            const today = new Date().toISOString().slice(0, 10);
            const title = `Program tracker alert: ${changed.length} page(s) need checking - ${today}`;

            const body = changed.map(item => {
              return `### ${item.company} - ${item.program}

Status: ${item.status_text || "Check page"}

Link: ${item.url}

Signal found:
${item.latest_match || "Page changed or needs checking."}
`;
            }).join("\n---\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });

      - name: Commit updated tracker data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update program tracker status data"
          file_pattern: data/*.json
